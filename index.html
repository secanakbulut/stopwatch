<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>stopwatch</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
    padding: 40px 20px;
    text-align: center;
  }
  h1 {
    color: #333;
    font-weight: normal;
    margin-bottom: 30px;
  }
  #display {
    font-family: monospace;
    font-size: 72px;
    color: #222;
    margin: 20px 0;
    letter-spacing: 2px;
  }
  .buttons {
    margin: 20px 0;
  }
  button {
    font-size: 16px;
    padding: 10px 22px;
    margin: 4px;
    border: 1px solid #999;
    background: white;
    cursor: pointer;
    border-radius: 3px;
  }
  button:hover {
    background: #eee;
  }
</style>
</head>
<body>

<h1>stopwatch</h1>

<div id="display">00:00.00</div>

<div class="buttons">
  <button id="startBtn">start</button>
  <button id="resetBtn">reset</button>
</div>

<script>
  var startTime = 0;
  var elapsed = 0;
  var running = false;
  var tickId = null;

  var display = document.getElementById('display');
  var startBtn = document.getElementById('startBtn');
  var resetBtn = document.getElementById('resetBtn');

  function pad(n) {
    return n < 10 ? '0' + n : '' + n;
  }

  function format(ms) {
    var totalCs = Math.floor(ms / 10);
    var cs = totalCs % 100;
    var totalSec = Math.floor(totalCs / 100);
    var s = totalSec % 60;
    var m = Math.floor(totalSec / 60);
    return pad(m) + ':' + pad(s) + '.' + pad(cs);
  }

  function tick() {
    var now = Date.now();
    var current = elapsed + (now - startTime);
    display.textContent = format(current);
  }

  function start() {
    if (running) {
      elapsed += Date.now() - startTime;
      clearInterval(tickId);
      running = false;
      startBtn.textContent = 'start';
    } else {
      startTime = Date.now();
      tickId = setInterval(tick, 30);
      running = true;
      startBtn.textContent = 'pause';
    }
  }

  function reset() {
    clearInterval(tickId);
    running = false;
    elapsed = 0;
    startTime = 0;
    display.textContent = '00:00.00';
    startBtn.textContent = 'start';
  }

  startBtn.addEventListener('click', start);
  resetBtn.addEventListener('click', reset);
</script>

</body>
</html>
